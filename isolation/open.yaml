kind: IsolationProfile
version: 1
metadata:
  name: open
  description: "Minimal isolation for experimentation"
  risk: high
namespaces:
  user: false
  pid: false
  mount: false
  network: false
landlock:
  filesystem:
    enabled: false
  network:
    enabled: false
seccomp:
  enabled: false
cgroup:
  enabled: false
environment:
  clean: true
  credential_inject: true
  allowed_vars: ["PATH", "HOME", "TERM"]
spawn:
  close_range: true
  tmpdir_isolated: false
  openat2_beneath: false
  dns_preresolve: false
